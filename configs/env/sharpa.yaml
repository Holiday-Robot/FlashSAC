##################################################################################
# Sharpa Wave In-Hand Rotate (IsaacLab)
##################################################################################

env_type: 'isaaclab'
env_name: 'Isaac-Inhand-Rotate-Sharpa-Wave-v0'
num_env_steps: ${num_env_steps}

seed: ${seed}
num_train_envs: ${num_train_envs}
num_eval_envs: ${num_eval_envs}
num_record_envs: ${num_record_envs}
rescale_action: null
max_episode_steps: null
use_priv_info: true

# Pass-through overrides applied to SharpaWaveEnvCfg before gym.make.
# Any flat field on the dataclass can be set here or via --overrides env.env_cfg_overrides.KEY=VALUE
env_cfg_overrides:
  gravity_curriculum: true
  reset_random_quat: false
  grasp_cache_path: '/home/fheller/sharpa-rl-lab-qol/cache/sharpa_grasp_linspace'
  randomize_friction: true
  randomize_mass: true
  enable_tactile: true
